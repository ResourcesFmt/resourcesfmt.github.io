        <div class="music-cover-wrap" id="cover-music-yn7sp2k1t">
          <div class="music-cover-placeholder" style="width: 100%; height: 100%;"></div>
        </div>
        <div class="music-info">
          <div class="music-title">${escapeHtml(currentSong.name)} - ${escapeHtml(currentSong.artist)}</div>
          <div class="music-progress"><div class="music-loaded"></div><div class="music-played"></div></div>
          <div class="music-bottom">
            <div class="music-controls">
              <div class="music-ctrl-btn ctrl-prev" title="上一首">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"></path></svg>
              </div>
              <div class="music-ctrl-btn ctrl-play-pause" title="播放/暂停">
                <svg viewBox="0 0 24 24"><path class="ctrl-play-path" d="M8 5v14l11-7z"></path><path class="ctrl-pause-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" style="display: none;"></path></svg>
              </div>
              <div class="music-ctrl-btn ctrl-next" title="下一首">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"></path></svg>
              </div>
              <div class="music-mode-btn" title="循环播放">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"></path></svg>
              </div>
            </div>
            <div class="music-time">00:00 / 00:00</div>
          </div>
        </div>
      </div>
      <div class="music-lrc-box"><div class="lrc-content"></div></div>
      <!-- 新增：播放列表标题栏 -->
      <div class="playlist-header" id="playlist-header-music-yn7sp2k1t">
        <div class="playlist-title">播放列表 (${playlist.length})</div>
        <svg class="playlist-toggle-icon" viewBox="0 0 24 24"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"></path></svg>
      </div>
      <!-- 新增：播放列表面板 -->
      <div class="music-playlist" id="playlist-music-yn7sp2k1t">
        ${playlist.map((song, index) => `
          <div class="playlist-item ${index === 0 ? 'active' : ''}" data-index="${index}">
            ${escapeHtml(song.name)} - ${escapeHtml(song.artist)}
          </div>
        `).join('')}
      </div>
      <div class="aplayer-target" style="display: none;"></div>
    `;
    shadow.appendChild(container);

    // 辅助函数：转义HTML（前端复用）
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(new RegExp(String.fromCharCode(96), 'g'), '&#96;');
    }

    // 初始化封面（首歌）
    const coverPlaceholder = shadow.querySelector('.music-cover-placeholder');
    const updateCover = (song) => {
      coverPlaceholder.innerHTML = ''; // 清空旧封面
      if (song.cover) {
        const img = document.createElement('img');
        img.src = song.cover;
        img.width = 80;
        img.height = 80;
        img.alt = escapeHtml(song.name);
        img.style.cssText = 'width: 100%; height: 100%; object-fit: cover; display: block;';
        img.loading = 'eager';
        coverPlaceholder.appendChild(img);
      } else {
        coverPlaceholder.innerHTML = '<div style="width: 100%; height: 100%; background: #f3f4f6; display: flex; align-items: center; justify-content: center; color: #9ca3af; font-size: 12px;">无封面</div>';
      }
    };
    updateCover(currentSong);

    // 初始化APlayer（支持列表）
    const ap = new APlayer({
      container: shadow.querySelector('.aplayer-target'),
      audio: playlist.map(song => ({
        name: song.name,
        artist: song.artist,
        url: song.url || '',
        cover: song.cover,
        lrc: song.lrc || ''
      })),
      lrcType: 1,
      autoplay: false,
      loop: 'all'
    });

    // 初始化歌词（首歌）
    const lrcContent = shadow.querySelector('.lrc-content');
    const musicTitle = shadow.querySelector('.music-title');
    const playlistPanel = shadow.querySelector('.music-playlist');
    const playlistHeader = shadow.querySelector('.playlist-header');
    const playlistItems = shadow.querySelectorAll('.playlist-item');
    const playedBar = shadow.querySelector('.music-played');
    const loadedBar = shadow.querySelector('.music-loaded');
    const timeText = shadow.querySelector('.music-time');
    const progressBar = shadow.querySelector('.music-progress');
    const coverWrap = shadow.querySelector('.music-cover-wrap');
    const modeBtn = shadow.querySelector('.music-mode-btn');
    const prevBtn = shadow.querySelector('.ctrl-prev');
    const nextBtn = shadow.querySelector('.ctrl-next');
    const playPauseBtn = shadow.querySelector('.ctrl-play-pause');
    const ctrlPlayPath = shadow.querySelector('.ctrl-play-path');
    const ctrlPausePath = shadow.querySelector('.ctrl-pause-path');

    // 播放模式切换逻辑
    const MODES = [
      { name: '循环播放', loop: 'all', order: 'list', icon: 'M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z' },
      { name: '单曲循环', loop: 'one', order: 'list', icon: 'M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z' },
      { name: '随机播放', loop: 'all', order: 'random', icon: 'M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.45 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z' }
    ];
    let currentModeIndex = 0;

    modeBtn.onclick = () => {
      currentModeIndex = (currentModeIndex + 1) % MODES.length;
      const mode = MODES[currentModeIndex];
      
      // 更新 APlayer 配置
      ap.options.loop = mode.loop;
      ap.options.order = mode.order;
      
      // 如果切换到随机模式，且 APlayer 内部没有随机序列，则生成一个
      if (mode.order === 'random' && (!ap.list.randomOrder || ap.list.randomOrder.length !== playlist.length)) {
        const num = playlist.length;
        const arr = Array.from({ length: num }, (_, i) => i);
        for (let i = num - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        ap.list.randomOrder = arr;
      }
      
      // 更新 UI
      modeBtn.title = mode.name;
      modeBtn.querySelector('path').setAttribute('d', mode.icon);
      
      console.log(`[MusicTag] Mode changed to: ${mode.name}`);
    };

    // 新增按钮逻辑
    prevBtn.onclick = (e) => { e.stopPropagation(); ap.skipBack(); };
    nextBtn.onclick = (e) => { e.stopPropagation(); ap.skipForward(); };
    playPauseBtn.onclick = (e) => { e.stopPropagation(); ap.toggle(); };

    // 折叠逻辑
    if (playlistHeader) {
      playlistHeader.onclick = () => {
        playlistHeader.classList.toggle('collapsed');
        playlistPanel.classList.toggle('collapsed');
      };
    }

    // 解析歌词函数
    const parseLrc = (lrcRaw) => {
      lrcContent.innerHTML = '';
      if (!lrcRaw) return [];
      const lrcLines = lrcRaw.split(/\r?\n/).map(line => {
        const match = line.match(/^\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
        return match ? { time: parseInt(match[1]) * 60 + parseFloat(match[2]), text: match[3].trim() } : null;
      }).filter(x => x);
      lrcContent.innerHTML = lrcLines.map(line => `<div class="lrc-line">${line.text || '&nbsp;'}</div>`).join('');
      return lrcLines;
    };
    let currentLrcLines = parseLrc(currentSong.lrc || '');

    // 播放控制
    coverWrap.onclick = (e) => {
      e.stopPropagation();
      ap.toggle();
    };
    musicTitle.onclick = () => {
      if (playlist.length > 1) {
        ap.skipForward();
      }
    };
    progressBar.onpointerdown = (e) => {
      e.preventDefault(); // 防止移动端长按弹出菜单
      const rect = progressBar.getBoundingClientRect();
      const updateSeek = (clientX) => {
        ap.seek(((clientX - rect.left) / rect.width) * ap.audio.duration);
      };
      
      const startX = e.clientX || (e.touches && e.touches[0].clientX);
      if (startX !== undefined) updateSeek(startX);

      const onPointerMove = (moveEvent) => {
        const moveX = moveEvent.clientX || (moveEvent.touches && moveEvent.touches[0].clientX);
        if (moveX !== undefined) updateSeek(moveX);
      };

      const onPointerUp = () => {
        window.removeEventListener('pointermove', onPointerMove);
        window.removeEventListener('pointerup', onPointerUp);
        window.removeEventListener('touchmove', onPointerMove);
        window.removeEventListener('touchend', onPointerUp);
      };

      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
      window.addEventListener('touchmove', onPointerMove, { passive: false });
      window.addEventListener('touchend', onPointerUp);
    };

    // 播放/暂停状态切换
    ap.on('play', () => { 
      ctrlPlayPath.style.display = 'none'; 
      ctrlPausePath.style.display = 'block'; 
    });
    ap.on('pause', () => { 
      ctrlPlayPath.style.display = 'block'; 
      ctrlPausePath.style.display = 'none'; 
    });

    // 时间格式化
    const formatTime = (s) => isNaN(s) ? '00:00' : [Math.floor(s/60), Math.floor(s%60)].map(v => v.toString().padStart(2, '0')).join(':');

    // 进度条+歌词同步
    ap.on('timeupdate', () => {
      const { currentTime: cur, duration: dur, buffered } = ap.audio;
      if (!dur) return;
      playedBar.style.width = (cur / dur * 100) + '%';
      if (buffered.length) loadedBar.style.width = (buffered.end(buffered.length - 1) / dur * 100) + '%';
      timeText.innerText = `${formatTime(cur)} / ${formatTime(dur)}`;

      let active = 0;
      for (let i = 0; i < currentLrcLines.length; i++) { 
        if (cur >= currentLrcLines[i].time) active = i; 
        else break; 
      }
      
      const divs = lrcContent.querySelectorAll('.lrc-line');
      divs.forEach((div, i) => {
        if (i === active) {
          if (!div.classList.contains('active')) {
            div.classList.add('active');
            host.style.setProperty('--active-index', active);
          }
        } else div.classList.remove('active');
      });
    });

    // 新增：切换歌曲事件（核心列表逻辑）
    ap.on('listswitch', ({ index }) => {
      const song = playlist[index];
      // 1. 更新标题
      musicTitle.innerHTML = `${escapeHtml(song.name)} - ${escapeHtml(song.artist)}`;
      // 2. 更新封面
      updateCover(song);
      // 3. 更新歌词
      currentLrcLines = parseLrc(song.lrc || '');
      // 4. 更新播放列表选中状态
      playlistItems.forEach((item, i) => {
        item.classList.toggle('active', i === index);
      });
      // 5. 重置进度条和时间
      playedBar.style.width = '0%';
      loadedBar.style.width = '0%';
      timeText.innerText = '00:00 / 00:00';
      host.style.setProperty('--active-index', 0);
    });

    // 新增：点击播放列表项切换歌曲
    playlistItems.forEach((item, index) => {
      item.onclick = () => {
        ap.list.switch(index); // 调用APlayer切换歌曲
      };
    });

    // 离开界面自动暂停逻辑
    // PJAX 页面切换监听（离开当前页面进入其他页面）
    document.addEventListener('pjax:send', function onPjaxSend() {
      if (!ap.audio.paused) {
        ap.pause();
      }
      // 移除自身，避免在后续 PJAX 过程中重复触发
      document.removeEventListener('pjax:send', onPjaxSend);
    });
  };

  // 加载APlayer并初始化
  if (window.APlayer) init();
  else {
    const script = document.createElement('script');
    script.src = 'https://cdn.staticfile.org/aplayer/1.10.1/APlayer.min.js';
    script.onload = init;
    document.body.appendChild(script);
  }
})();
</script>
